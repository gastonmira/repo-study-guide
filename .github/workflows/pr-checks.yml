name: PR checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  content-checks:
    name: Content & consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Cache the Chromium that mermaid-cli (puppeteer) downloads so we don't
      # re-fetch it on every run.
      - name: Cache puppeteer browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}

      - name: Run PR checks
        run: |
          npm ci
          npm run check
